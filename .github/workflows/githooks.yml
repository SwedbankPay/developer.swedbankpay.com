name: Githooks

on: [push, pull_request]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Shellcheck
      uses: bewuethr/shellcheck-action@80bac2daa9fcf95d648200a793d00060857e6dc4 # v2.3.0

  commit-msg:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Valid commit messages
      shell: bash
      run: bash ./.github/scripts/commit-msg-test.sh

  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Valid branch names
      shell: bash
      run: |
        git checkout -b feature/dx-123_hello
        bash ./.githooks/pre-commit

    - name: Invalid branch names
      shell: bash
      run: |
        git checkout -b feature/hello
        bash ./.githooks/pre-commit
