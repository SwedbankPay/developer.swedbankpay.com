version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
    time: "03:00"
    timezone: Europe/Oslo
  open-pull-requests-limit: 99
  versioning-strategy: lockfile-only
  ignore:
    - dependency-name: swedbank-pay-design-guide-jekyll-theme
    - dependency-name: ffi
    - dependency-name: rubocop

  directory: "/"
  schedule:
    interval: daily
    time: "03:00"
    timezone: Europe/Oslo
  open-pull-requests-limit: 99

  ignore:
    - dependency-name: minimatch
      versions:
        - ">=10.0.0 <10.2.2"

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "03:00"
    timezone: Europe/Oslo
  open-pull-requests-limit: 99
